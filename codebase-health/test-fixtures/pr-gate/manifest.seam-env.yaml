schema_version: 1
manifest_revision: 1
# CH-03 §12 seam-row env-selection fixture: alert_seam is an env-keyed map. The
# join collapses it to the AUDITED-environment key before the lattice compares
# (--env=prod -> `none`; default -> `paged`). Same shape as the reference join
# manifest, only the alert_seam map differs.
spec:
  path: ./payments.md
  title: "Payment capture"
  spec_hash: "sha256:1111111111111111111111111111111111111111111111111111111111111111"
completeness: complete
incomplete_fields: []
observability:
  profile: payments
environments: [dev, prod]
interrogation:
  log:
    - id: DL-001
      summary: "Capture is paged in prod"
      resolved_by: human
      dissent: ""
journeys:
  - id: J-pay-001
    name: "Payment capture"
    lifecycle: active
    criticality: CORE
    criticality_reason: "Money movement"
    confirmation: confirmed
    confirmed_by: DL-001
    steps:
      - name: "Capture authorized"
        vital_class: money
        required_emission: OBSERVED
        event_name: pay.captured
        alert_seam:
          default: paged
          prod: none
        idempotency:
          required: true
          mechanism: idempotency-key
          justification: "Retry-safe capture"
        compensation:
          none_reason: "Capture is terminal; refunds are a separate journey"
behaviors:
  - id: B-pay-001
    title: "Captures an authorized payment once"
    lifecycle: active
    journey: J-pay-001
    criticality: CORE
    confirmation: confirmed
    confirmed_by: DL-001
    given: "An authorized payment intent"
    when: "Capture is requested twice with the same idempotency key"
    then: "The payment is captured once and pay.captured is emitted once"
    test_name_hint: "test_capture_is_idempotent"
