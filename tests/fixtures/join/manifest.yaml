schema_version: 1
manifest_revision: 1
spec:
  path: ./payments.md
  title: "Payment capture"
  spec_hash: "sha256:1111111111111111111111111111111111111111111111111111111111111111"
completeness: complete
incomplete_fields: []
observability:
  profile: payments
environments: [dev, prod]
interrogation:
  log:
    - id: DL-001
      summary: "Capture is paged in prod"
      resolved_by: human
      dissent: ""
journeys:
  - id: J-pay-001
    name: "Payment capture"
    lifecycle: active
    criticality: CORE
    criticality_reason: "Money movement"
    confirmation: confirmed
    confirmed_by: DL-001
    # SD-01 declared locus family (additive-optional). All app-locus here so the
    # reference pair exercises the VERIFY path; the self-test derives gateway/
    # sidecar/db-config/none-declared variants in $WORK to exercise out-of-scope.
    abuse_controls:
      locus: app
      note: "App-side token-bucket on the capture entry step"
    steps:
      - name: "Capture authorized"
        vital_class: money
        required_emission: OBSERVED
        event_name: pay.captured
        alert_seam:
          default: paged
        idempotency:
          required: true
          mechanism: idempotency-key
          justification: "Retry-safe capture"
        compensation:
          none_reason: "Capture is terminal; refunds are a separate journey"
        resilience_posture:
          locus: app
          mechanism: breaker
        isolation_requirement:
          locus: app
          level: serializable
        timeout_budget_ms: 3000
behaviors:
  - id: B-pay-001
    title: "Captures an authorized payment once"
    lifecycle: active
    journey: J-pay-001
    criticality: CORE
    confirmation: confirmed
    confirmed_by: DL-001
    given: "An authorized payment intent"
    when: "Capture is requested twice with the same idempotency key"
    then: "The payment is captured once and pay.captured is emitted once"
    test_name_hint: "test_capture_is_idempotent"
