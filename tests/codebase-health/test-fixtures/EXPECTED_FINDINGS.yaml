# Ground truth for the planted-defect corpus in planted/.
#
# This manifest deliberately lives OUTSIDE planted/ — it names every marker it
# expects, so scanning it alongside the corpus would let assertions pass off
# the answer key instead of the plants (a vacuous pass the adversarial review
# actually caught).
#
# Two consumers:
#   1. scripts/self_test.sh — asserts every `expected_by: deterministic` entry
#      mechanically (grep-level recall) and every `must_not_flag` exclusion.
#   2. Agent-level eval — run /audit against a BLIND copy of the corpus
#      (`scripts/make_blind_corpus.sh` strips the PLANT annotations; the
#      annotated original is a reading-comprehension test, not an eval) and
#      compare the report to the `expected_by: agent` entries.
#      Recall = found/expected; a must_not_flag violation is a precision
#      failure. Do this after any change to agent prompts, the taxonomy, or
#      any reference a dispatched agent consumes — and it MUST have been done
#      before any release in which one of those changed (date + git SHA
#      recorded in GAPS_SPEC; the Wave 5 release checklist blocks without a
#      current eval — pre-flight fix E, SPEC_1.4.0).
#
# A third register, `expected_noise:` (EN1–EN4, pre-flight fix F), names the
# findings the 1.4.0 fixture bulk legitimately triggers in EXISTING detectors.
# Blind-eval hand-scoring counts those as neither recall nor precision events;
# self_test.sh ignores them. must_not_flag would be the wrong instrument —
# those detector hits are CORRECT behavior.
#
# The miss-to-fixture rule (references/audit-state-and-verify.md): every
# real-world miss gets planted here BEFORE the detection gap is fixed.

